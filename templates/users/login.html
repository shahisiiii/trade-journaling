{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Trade Journal{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card hover-lift">
                <div class="card-header text-center">
                    <div class="glass-light p-3 rounded-circle d-inline-block mb-3">
                        <i class="bi bi-box-arrow-in-right display-6"></i>
                    </div>
                    <h4 class="mb-0">Welcome Back</h4>
                    <p class="text-secondary mb-0">Sign in to your account</p>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100 mb-3 hover-lift">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <div class="glass-light p-3 rounded-3">
                            <p class="mb-2"><a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot your password?</a></p>
                            <p class="mb-0">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign up here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
