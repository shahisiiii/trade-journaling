{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - Trade Journal{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card hover-lift">
                <div class="card-header text-center">
                    <div class="glass-light p-3 rounded-circle d-inline-block mb-3">
                        <i class="bi bi-person-plus display-6 text-success"></i>
                    </div>
                    <h4 class="mb-0">Create Account</h4>
                    <p class="text-secondary mb-0">Join our trading community</p>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-success w-100 mb-3 hover-lift">
                            <i class="bi bi-person-plus"></i> Create Account
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <div class="glass-light p-3 rounded-3">
                            <p class="mb-0">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
